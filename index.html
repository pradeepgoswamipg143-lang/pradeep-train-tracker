<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pradeep Train Tracker - All India Live</title>
</head>
<body style="background-color: #f4f6f9; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 30px;">

    <!-- Premium Brand App Header -->
    <div style="background-color: #0d47a1; color: white; padding: 18px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); margin-bottom: 15px; position: sticky; top: 0; z-index: 100;">
        <h1 style="margin: 0; font-size: 24px; letter-spacing: 0.5px;">Pradeep Train Tracker 🚂</h1>
        <p style="margin: 4px 0 0 0; font-size: 13px; opacity: 0.85; font-weight: bold;">All India Live Route & Station Search</p>
    </div>

    <!-- MAIN INTERFACE AREA -->
    <div style="width: 92%; max-width: 380px; margin: 0 auto;">

        <!-- 🚂 FEATURE 1: ALL INDIA STATION TO STATION INTERFACE -->
        <div style="background-color: white; padding: 18px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.06); margin-bottom: 15px; text-align: left; border: 1px solid #e0e0e0;">
            <h3 style="margin-top: 0; margin-bottom: 15px; color: #2e7d32; font-size: 16px; display: flex; align-items: center; gap: 8px;">
                <span>🔍</span> All India Station Route
            </h3>
            
            <div style="display: flex; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                <span style="font-size: 14px; margin-right: 12px; color: #4caf50;">🟢 FROM</span>
                <input type="text" id="sourceStation" placeholder="Enter Any Station Name / Code" style="padding: 8px; width: 100%; border: none; font-size: 15px; outline: none; font-weight: bold;">
            </div>
            
            <div style="display: flex; align-items: center; margin-bottom: 18px; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                <span style="font-size: 14px; margin-right: 16px; color: #f44336;">🔴 TO</span>
                <input type="text" id="destStation" placeholder="Enter Destination Station" style="padding: 8px; width: 100%; border: none; font-size: 15px; outline: none; font-weight: bold;">
            </div>

            <button onclick="findTrainsBetweenStations()" style="padding: 13px; background-color: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; width: 100%; cursor: pointer; box-shadow: 0 4px 6px rgba(46,125,50,0.2);">Find Trains</button>
        </div>

        <!-- 🛠️ INTERACTIVE NAVIGATION FOR SUB SERVICES -->
        <div style="display: flex; justify-content: center; margin-bottom: 15px; gap: 6px;">
            <button onclick="switchTab('liveStatus')" id="tab-liveStatus" style="flex: 1; padding: 12px 5px; background-color: #0d47a1; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 12px;">Live Status</button>
            <button onclick="switchTab('pnrStatus')" id="tab-pnrStatus" style="flex: 1; padding: 12px 5px; background-color: white; color: #e65100; border: 1px solid #e65100; border-radius: 8px; font-weight: bold; font-size: 12px;">PNR Status</button>
            <button onclick="switchTab('seatAvail')" id="tab-seatAvail" style="flex: 1; padding: 12px 5px; background-color: white; color: #1565c0; border: 1px solid #1565c0; border-radius: 8px; font-weight: bold; font-size: 12px;">Seat Check</button>
        </div>

        <!-- SUB SERVICE INPUT CARDS -->
        <div id="content-liveStatus" class="tab-content" style="background-color: white; padding: 16px; border-radius: 12px; box-shadow: 0px 4px 12px rgba(0,0,0,0.05); border: 1px solid #e0e0e0;">
            <input type="text" id="trainInput" placeholder="Enter Train Number (e.g., 12215)" style="padding: 12px; width: 90%; border: 2px solid #0d47a1; border-radius: 8px; font-size: 15px; margin-bottom: 12px; font-weight: bold; text-align: center;"><br>
            <button onclick="fetchData('live')" style="padding: 12px; background-color: #0d47a1; color: white; border: none; border-radius: 8px; font-weight: bold; width: 97%; font-size: 15px;">Train Dhundo</button>
        </div>

        <div id="content-pnrStatus" class="tab-content" style="display: none; background-color: white; padding: 16px; border-radius: 12px; box-shadow: 0px 4px 12px rgba(0,0,0,0.05); border: 1px solid #e0e0e0;">
            <input type="number" id="pnrInput" placeholder="Enter 10-Digit PNR Number" style="padding: 12px; width: 90%; border: 2px solid #e65100; border-radius: 8px; font-size: 15px; margin-bottom: 12px; font-weight: bold; text-align: center;"><br>
            <button onclick="fetchData('pnr')" style="padding: 12px; background-color: #e65100; color: white; border: none; border-radius: 8px; font-weight: bold; width: 97%; font-size: 15px;">PNR Check</button>
        </div>

        <div id="content-seatAvail" class="tab-content" style="display: none; background-color: white; padding: 16px; border-radius: 12px; box-shadow: 0px 4px 12px rgba(0,0,0,0.05); border: 1px solid #e0e0e0;">
            <input type="text" id="seatTrainInput" placeholder="Train Number (e.g., 12834)" style="padding: 12px; width: 90%; border: 2px solid #1565c0; border-radius: 8px; font-size: 15px; margin-bottom: 12px; font-weight: bold; text-align: center;"><br>
            <button onclick="fetchData('seat')" style="padding: 12px; background-color: #1565c0; color: white; border: none; border-radius: 8px; font-weight: bold; width: 97%; font-size: 15px;">Check Seat</button>
        </div>

        <!-- SMART DISPLAY CONSOLE -->
        <div id="resultSection" style="display: none; margin-top: 20px; padding: 16px; text-align: left; background-color: white; border-radius: 12px; box-shadow: 0px 5px 15px rgba(0,0,0,0.12); border-left: 5px solid #0d47a1;">
            <h3 id="resultTitle" style="color: #0d47a1; margin-top: 0; border-bottom: 2px solid #f0f4f8; padding-bottom: 10px; font-size: 16px;">Results</h3>
            <div id="resultBody" style="line-height: 1.5; font-size: 14px;"></div>
        </div>

        <!-- WHATSAPP SHARE WIDGET -->
        <div style="margin-top: 25px; padding: 12px; background-color: #e8f5e9; border-radius: 10px; border: 1px solid #a5d6a7;">
            <a href="https://whatsapp.com! Check out my brand new Train Tracker App built entirely on mobile: https://netlify.app" target="_blank" style="display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; background-color: #25d366; color: white; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 15px;">
                <span>🟢</span> Share App on WhatsApp
            </a>
        </div>

    </div>

    <!-- APP ENGINE: DYNAMIC ROUTE SEARCH -->
    <script>
    function findTrainsBetweenStations() {
        var src = document.getElementById('sourceStation').value.trim();
        var dst = document.getElementById('destStation').value.trim();
        var resultDiv = document.getElementById('resultSection');
        var title = document.getElementById('resultTitle');
        var body = document.getElementById('resultBody');

        if(src == "" || dst == "") {
            alert("Kripya Stations ke naam likhein!");
            return;
        }

        resultDiv.style.borderLeft = "5px solid #2e7d32";
        title.innerHTML = "🔍 Route: " + src.toUpperCase() + " ➔ " + dst.toUpperCase();
        resultDiv.style.display = "block";
        
        body.innerHTML = `
            <p style="color:#2e7d32; font-weight:bold; margin-top:0; font-size:15px;">🟢 Indian Railways Network Connected!</p>
            <div style="padding: 10px; background-color: #f9f9f9; border-radius: 6px; border-left: 3px solid #2e7d32; margin-bottom: 10px;">
                <b style="color:#0d47a1; font-size:15px;">Express & Mail Connectivity Active</b><br>
                <span style="font-size:13px; color:#333;">Aapne <b>${src}</b> se <b>${dst}</b> ka route search kiya hai. Real-time timetable loading successful!</span>
            </div>
            <div style="border-bottom: 1px solid #eee; padding: 8px 0;">
                <b style="color:#333;">🚂 Superfast Express Trains</b><br>
                <span style="font-size:12px; color:#666;">Schedule Status: Active | Run Days: Mon, Wed, Fri, Sun</span>
            </div>
            <div style="padding: 8px 0 0 0;">
                <b style="color:#333;">🚂 Humsafar / Mail Service</b><br>
                <span style="font-size:12px; color:#666;">Schedule Status: Available | Run Days: Daily Service</span>
            </div>
        `;
    }

    function switchTab(tabId) {
        var contents = document.getElementsByClassName('tab-content');
        for (var i = 0; i < contents.length; i++) { contents[i].style.display = 'none'; }
        document.getElementById('content-' + tabId).style.display = 'block';

        var tabs = ['liveStatus', 'pnrStatus', 'seatAvail'];
        tabs.forEach(function(t) {
            var btn = document.getElementById('tab-' + t);
            if(t === tabId) {
                if(tabId === 'liveStatus') { btn.style.backgroundColor = '#0d47a1'; btn.style.color = 'white'; }
                if(tabId === 'pnrStatus') { btn.style.backgroundColor = '#e65100'; btn.style.color = 'white'; }
                if(tabId === 'seatAvail') { btn.style.backgroundColor = '#1565c0'; btn.style.color = 'white'; }
                btn.style.border = 'none';
            } else {
                btn.style.backgroundColor = 'white';
                if(t === 'liveStatus') { btn.style.color = '#0d47a1'; btn.style.border = '1px solid #0d47a1'; }
                if(t === 'pnrStatus') { color = '#e65100'; btn.style.color = '#e65100'; btn.style.border = '1px solid #e65100'; }
                if(t === 'seatAvail') { btn.style.color = '#1565c0'; btn.style.border = '1px solid #1565c0'; }
            }
        });
